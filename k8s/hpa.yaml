apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: universidade-hpa
  namespace: universidade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: universidade-app

  # Quantidade mínima de réplicas (garante disponibilidade mesmo sem carga)
  minReplicas: 2

  # Quantidade máxima de réplicas (controla custo máximo)
  maxReplicas: 10

  metrics:
    # Escala quando CPU média dos pods ultrapassar 60%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    # Escala quando memória média dos pods ultrapassar 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      # Aguarda 5 minutos antes de remover pods (evita flapping)
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

# PRÉ-REQUISITO: metrics-server deve estar instalado no cluster.
# Instalação local (minikube): minikube addons enable metrics-server
# Instalação manual:  kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# Para AWS EKS: o metrics-server é instalado via Add-on ou helm chart.
