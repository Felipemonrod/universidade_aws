# OPÇÃO 1 — Secret manual (apenas para testes iniciais)
# Em produção, use o External Secrets Operator (Opção 2).
#
# Gere os valores com: echo -n "valor" | base64
apiVersion: v1
kind: Secret
metadata:
  name: universidade-secret
  namespace: universidade
type: Opaque
data:
  DB_USERNAME: YWRtaW4=        # admin
  DB_PASSWORD: c3VhU2VuaGFBV1M=  # suaSenhaAWS (substitua pelo valor real)

---
