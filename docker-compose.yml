version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose — ambiente local completo (app + banco de dados)
# Uso: docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: universidade-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: universidade
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d universidade"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Spring Boot Application ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: universidade-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/universidade
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: senha123
      SPRING_PROFILES_ACTIVE: default
      SERVER_PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    name: universidade_postgres_data
