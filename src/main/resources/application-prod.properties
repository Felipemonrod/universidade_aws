# ── Perfil de produção (AWS / Kubernetes) ────────────────────────────────────
# Todas as variáveis sensíveis vêm de Kubernetes Secrets ou AWS Secrets Manager.
# Não defina valores padrão aqui — a ausência force explícita das vars no deploy.

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Pool maior em produção
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20

spring.jpa.show-sql=false
spring.thymeleaf.cache=true

# Log mínimo em produção
logging.level.root=WARN
logging.level.com.universidade=INFO

# Actuator expõe apenas /health (ALB Target Group Health Check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
