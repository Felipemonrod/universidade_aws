spring.application.name=universidade-aws

# ── Datasource ──────────────────────────────────────────────────────────────
# Valores padrão para desenvolvimento local; sobrescritos por variáveis de ambiente
# no Docker Compose / Kubernetes / AWS RDS.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/universidade}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:senha123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway (versionamento de schema) ─────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Actuator (health checks para Kubernetes probes) ──────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.db.enabled=true

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
