<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle + ' — XYZ University'}">Formulário — XYZ University</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">🎓 XYZ University</span>
    <div>
        <a class="nav-link text-white d-inline" th:href="@{/}">Home</a>
        <a class="nav-link text-white d-inline ms-3" th:href="@{/students}">Students list</a>
        <a class="nav-link text-warning d-inline ms-3 fw-bold" th:href="@{/stress-test}">Stress Test</a>
    </div>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <h2 th:text="${pageTitle}">Formulário</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="${formAction}" th:object="${student}" method="post" novalidate>

        <div class="mb-3">
            <label class="form-label">Nome *</label>
            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   th:field="*{name}" placeholder="Nome completo"/>
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Endereço *</label>
            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"
                   th:field="*{address}" placeholder="Rua, número"/>
            <div class="invalid-feedback" th:errors="*{address}"></div>
        </div>

        <div class="row">
            <div class="col-md-8 mb-3">
                <label class="form-label">Cidade *</label>
                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'"
                       th:field="*{city}" placeholder="Cidade"/>
                <div class="invalid-feedback" th:errors="*{city}"></div>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Estado *</label>
                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('state')} ? 'is-invalid'"
                       th:field="*{state}" placeholder="SP"/>
                <div class="invalid-feedback" th:errors="*{state}"></div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   th:field="*{email}" placeholder="email@exemplo.com"/>
            <div class="invalid-feedback" th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Telefone *</label>
            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                   th:field="*{phone}" placeholder="11999887766"/>
            <div class="invalid-feedback" th:errors="*{phone}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a th:href="@{/students}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
